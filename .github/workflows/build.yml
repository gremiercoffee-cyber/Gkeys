name: Build Gkeys APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"

          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | head -1)"
          fi
          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $ANDROID_HOME/cmdline-tools"
            ls -la "$ANDROID_HOME/cmdline-tools/" || true
            exit 1
          fi
          echo "Using sdkmanager at $SDKMANAGER"

          for attempt in 1 2 3; do
            "$SDKMANAGER" --install "platforms;android-34" "build-tools;34.0.0" && break
            echo "sdkmanager install attempt ${attempt} failed, retrying in 15s..."
            sleep 15
          done
          yes | "$SDKMANAGER" --licenses

      - name: Build debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gkeys-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
