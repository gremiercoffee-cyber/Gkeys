name: Build Gkeys APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Android SDK packages
        run: |
          echo "Using SDK at $ANDROID_HOME"
          for attempt in 1 2 3; do
            sdkmanager --install "platforms;android-34" "build-tools;34.0.0" && break
            echo "sdkmanager attempt ${attempt} failed, retrying in 15s..."
            sleep 15
          done
          yes | sdkmanager --licenses

      - name: Build debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gkeys-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
